name: Deploy Backend to VPS

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  test:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        working-directory: apps/api

      - name: Run tests
        run: pnpm test

  build:
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build --filter=@tara/api

      - name: Build packages
        run: pnpm build --filter=@tara/types --filter=@tara/zod-schemas

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: |
            apps/api/dist
            apps/api/node_modules
            packages/types/dist
            packages/zod-schemas/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: api-build
          path: /tmp/build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /root/tara-delivery

            # Pull latest changes
            git fetch origin
            git checkout main
            git pull origin main

            # Restore build artifacts
            cp -r /tmp/build/* apps/
            cp -r /tmp/build/* packages/

            # Install dependencies if needed
            pnpm install --frozen-lockfile

            # Generate Prisma client
            cd apps/api
            pnpm db:generate

            # Run migrations
            pnpm db:migrate

            # Restart API service
            pm2 restart tara-api || pm2 start dist/index.js --name tara-api

            # Show status
            pm2 status
